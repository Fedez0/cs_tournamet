{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
    {% if user.is_authenticated %}
        <h2>Edit Profile</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>
    {% else %}
        <p>Devi essere autenticato per modificare il tuo profilo.</p>
    {% endif %}
{% endblock %}
