{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
    {% if user.is_authenticated %}
        <h1>Bentornato {{ user.username }}!</h1>
        <a href="/logout/">Logout</a>
        <a href="/teams/create/">Crea Squadra</a>
        <a href="/teams/list/">Visualizza Squadra</a>
        <a href="/profile/">View Profile</a>
        <a href="/tournaments/create/">Crea torneo</a>
        <a href="/tournaments/list/">Vedi i tornei </a>
    
    {% else %}
        <h1>Devi autenticarti!</h1>
    {% endif %}
{% endblock %}
