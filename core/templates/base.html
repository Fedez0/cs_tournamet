<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cs_tournament</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
    .mock { background:#111318; border-radius:12px; overflow:hidden; font-family:var(--font-sans); color:#e2e2e2; }
    .nav { background:#0d0f13; border-bottom:0.5px solid #2a2d35; padding:0 20px; height:48px; display:flex; align-items:center; gap:20px; }
    .nav-logo { color:#f0522a; font-weight:500; font-size:15px; letter-spacing:.5px; }
    .nav-link { font-size:13px; color:#8a8d96; cursor:pointer; }
    .nav-link.active { color:#e2e2e2; }
    .nav-right { margin-left:auto; display:flex; gap:10px; align-items:center; }
    .btn-primary { 
        background:#f0522a; 
        color:#fff; 
        border:none; 
        border-radius:6px; 
        padding:5px 14px; 
        font-size:13px; 
        cursor:pointer; 
        font-weight:500; 
        text-decoration: none;
    }
    .btn-ghost { background:transparent; text-decoration: none;color:#8a8d96; border:0.5px solid #2a2d35; border-radius:6px; padding:5px 14px; font-size:13px; cursor:pointer; }
    .hero { background:#0d0f13; padding:28px 20px 24px; border-bottom:0.5px solid #2a2d35; }
    .hero h1 { font-size:22px; font-weight:500; color:#fff; margin:0 0 6px; }
    .hero p { font-size:13px; color:#8a8d96; margin:0 0 16px; }
    .hero-btns { display:flex; gap:10px; }
    .section { padding:20px; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-title { font-size:14px; font-weight:500; color:#e2e2e2; margin:0; }
    .see-all { font-size:12px; color:#f0522a; cursor:pointer; }
    .cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .card { background:#1a1d24; border:0.5px solid #2a2d35; border-radius:8px; padding:14px; }
    .card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .card-name { font-size:14px; font-weight:500; color:#e2e2e2; }
    .badge { font-size:11px; padding:2px 8px; border-radius:4px; font-weight:500; }
    .badge-open { background:#0f3d1e; color:#4caf74; }
    .badge-soon { background:#3d2a0a; color:#f0a030; }
    .badge-closed { background:#2a1a1a; color:#e24b4a; }
    .card-meta { display:flex; flex-direction:column; gap:5px; }
    .meta-row { display:flex; align-items:center; gap:6px; font-size:12px; color:#8a8d96; }
    .meta-row i { font-size:14px; }
    .card-footer { border-top:0.5px solid #2a2d35; margin-top:12px; padding-top:10px; display:flex; align-items:center; justify-content:space-between; }
    .prize { font-size:13px; color:#f0a030; font-weight:500; }
    .btn-sm { font-size:12px; padding:4px 12px; border-radius:5px; cursor:pointer; border:none; font-weight:500; }
    .btn-join { background:#f0522a; color:#fff; }
    .btn-full { background:#2a2d35; color:#8a8d96; }
    .divider { height:0.5px; background:#2a2d35; margin:0 20px; }
    .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:16px 20px; }
    .stat { background:#1a1d24; border:0.5px solid #2a2d35; border-radius:8px; padding:12px; text-align:center; }
    .stat-num { font-size:20px; font-weight:500; color:#f0522a; }
    .stat-label { font-size:11px; color:#8a8d96; margin-top:2px; }
    .nav-logo {
    display: flex;
    align-items: center;
    text-decoration: none !important;
    }

    .logo-img {
    height: 28px;       /* altezza fissa, si adatta alla navbar di 48px */
    width: auto;        /* mantiene le proporzioni */
    object-fit: contain;
    }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    {% include "components/header.html" %}
    
    
    
    

    <main class="flex-grow-1">

        {% block content %}

        {% endblock %}

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    
    
    
    {% include "components/footer.html" %}
</body>
</html>
