{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Conferma Eliminazione Team</h2>
    <p>Sei sicuro di voler eliminare il team "{{ team.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Elimina</button>
        <a href="{% url 'team_list' %}" class="btn btn-secondary">Annulla</a>
    </form>
</div>
{% endblock %}
